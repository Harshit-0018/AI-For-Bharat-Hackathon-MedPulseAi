<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedPulse — Real-Time Social Health Signal Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet">

  <!-- 1. Stable React 17 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/17.0.2/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/17.0.2/umd/react-dom.development.js"></script>

  <!-- 2. Babel for in-browser JSX compilation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <!-- 3. PropTypes (Crucial for Recharts standalone) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.2/prop-types.min.js"></script>



  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #080c14;
      --bg2: #0d1320;
      --bg3: #111927;
      --bg4: #161f2e;
      --border: #1e2d42;
      --border2: #243549;
      --text: #e8edf5;
      --muted: #5a7090;
      --muted2: #7a94b0;
      --accent: #00d4b4;
      --accent2: #0099ff;
      --red: #ff4560;
      --amber: #ffb020;
      --green: #00d4b4;
      --purple: #a78bfa;
      --mono: 'DM Mono', monospace;
      --sans: 'Syne', sans-serif;
      --body: 'Inter', sans-serif;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--body)
    }

    #root {
      height: 100%
    }

    ::-webkit-scrollbar {
      width: 4px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg2)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0
    }

    .sidebar-logo {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border)
    }

    .logo-mark {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .logo-pulse {
      width: 28px;
      height: 28px;
      position: relative
    }

    .logo-pulse svg {
      width: 28px;
      height: 28px
    }

    .logo-text {
      font-family: var(--sans);
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -0.3px
    }

    .logo-sub {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px
    }

    .sidebar-nav {
      padding: 12px 0;
      flex: 1;
      overflow-y: auto
    }

    .nav-section {
      padding: 8px 16px 4px;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted2);
      transition: all .15s;
      border-left: 2px solid transparent;
      font-family: var(--body);
      font-weight: 400
    }

    .nav-item:hover {
      background: var(--bg3);
      color: var(--text)
    }

    .nav-item.active {
      background: var(--bg3);
      color: var(--accent);
      border-left-color: var(--accent)
    }

    .nav-item .badge {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 10px;
      background: var(--red);
      color: #fff;
      padding: 1px 6px;
      border-radius: 8px
    }

    .sidebar-bottom {
      padding: 12px 16px;
      border-top: 1px solid var(--border)
    }

    .api-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--muted2);
      font-family: var(--mono)
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse-dot 2s infinite
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    /* MAIN */
    .main {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column
    }

    .topbar {
      height: 52px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      flex-shrink: 0
    }

    .topbar-title {
      font-family: var(--sans);
      font-weight: 600;
      font-size: 15px;
      flex: 1
    }

    .topbar-chip {
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid var(--border2);
      color: var(--muted2)
    }

    .topbar-chip.live {
      border-color: var(--accent);
      color: var(--accent);
      animation: live-blink 2s infinite
    }

    @keyframes live-blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .6
      }
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px
    }

    /* STAT CARDS */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px
    }

    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      position: relative;
      overflow: hidden
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px
    }

    .stat-card.blue::before {
      background: var(--accent2)
    }

    .stat-card.green::before {
      background: var(--accent)
    }

    .stat-card.red::before {
      background: var(--red)
    }

    .stat-card.amber::before {
      background: var(--amber)
    }

    .stat-card.purple::before {
      background: var(--purple)
    }

    .stat-card.muted::before {
      background: var(--muted)
    }

    .stat-label {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 6px
    }

    .stat-value {
      font-family: var(--sans);
      font-size: 24px;
      font-weight: 700;
      line-height: 1
    }

    .stat-value.red {
      color: var(--red)
    }

    .stat-value.green {
      color: var(--accent)
    }

    .stat-sub {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      font-family: var(--mono)
    }

    /* GRID */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border)
    }

    .card-title {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600
    }

    .card-body {
      padding: 16px
    }

    .card-action {
      font-size: 11px;
      color: var(--accent);
      cursor: pointer;
      font-family: var(--mono);
      background: none;
      border: none;
    }

    /* SIGNAL FEED */
    .signal-list {
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .signal-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      cursor: pointer;
      transition: all .15s;
      position: relative
    }

    .signal-item:hover {
      border-color: var(--border2);
      background: var(--bg4)
    }

    .signal-item.selected {
      border-color: var(--accent);
      background: var(--bg4)
    }

    .signal-item.critical {
      border-left: 3px solid var(--red)
    }

    .signal-item.high {
      border-left: 3px solid var(--amber)
    }

    .signal-item.medium {
      border-left: 3px solid var(--purple)
    }

    .signal-item.low {
      border-left: 3px solid var(--muted)
    }

    .sig-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px
    }

    .sig-source {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--bg);
      color: var(--muted2);
      border: 1px solid var(--border)
    }

    .sig-time {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-left: auto
    }

    .sig-text {
      font-size: 12px;
      line-height: 1.55;
      color: var(--muted2)
    }

    .sig-text em {
      color: var(--amber);
      font-style: normal;
      font-weight: 500
    }

    .sig-tags {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap
    }

    .tag {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px
    }

    .tag.drug {
      background: rgba(0, 153, 255, .12);
      color: #5bb3ff;
      border: 1px solid rgba(0, 153, 255, .2)
    }

    .tag.symptom {
      background: rgba(255, 180, 32, .1);
      color: var(--amber);
      border: 1px solid rgba(255, 180, 32, .2)
    }

    .tag.adverse {
      background: rgba(255, 69, 96, .12);
      color: #ff7a8e;
      border: 1px solid rgba(255, 69, 96, .2)
    }

    .tag.pii {
      background: rgba(167, 139, 250, .12);
      color: var(--purple);
      border: 1px solid rgba(167, 139, 250, .2)
    }

    .severity-badge {
      font-family: var(--mono);
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500
    }

    .severity-badge.Critical {
      background: rgba(255, 69, 96, .2);
      color: var(--red)
    }

    .severity-badge.High {
      background: rgba(255, 180, 32, .15);
      color: var(--amber)
    }

    .severity-badge.Medium {
      background: rgba(167, 139, 250, .15);
      color: var(--purple)
    }

    .severity-badge.Low {
      background: rgba(90, 112, 144, .15);
      color: var(--muted2)
    }

    .severity-badge.None {
      background: rgba(90, 112, 144, .1);
      color: var(--muted)
    }

    /* ANALYSIS PANEL */
    .analysis-panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column
    }

    .analysis-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
      color: var(--muted)
    }

    .analysis-empty .icon {
      font-size: 32px;
      margin-bottom: 12px;
      opacity: .3
    }

    .analysis-empty p {
      font-size: 12px;
      line-height: 1.6
    }

    .analysis-loading {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .loading-text {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      animation: loading-fade 1.5s infinite
    }

    @keyframes loading-fade {

      0%,
      100% {
        opacity: .4
      }

      50% {
        opacity: 1
      }
    }

    .analysis-result {
      padding: 16px;
      overflow-y: auto;
      flex: 1
    }

    .ar-section {
      margin-bottom: 16px
    }

    .ar-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px
    }

    .ar-summary {
      font-size: 12px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg3);
      padding: 10px;
      border-radius: 6px;
      border: 1px solid var(--border)
    }

    .entity-list {
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .entity-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 8px;
      background: var(--bg3);
      border-radius: 4px;
      border: 1px solid var(--border)
    }

    .entity-name {
      font-size: 12px;
      font-weight: 500
    }

    .entity-type {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted)
    }

    .meter-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px
    }

    .meter-label {
      font-size: 11px;
      color: var(--muted2);
      width: 70px;
      font-family: var(--mono)
    }

    .meter {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden
    }

    .meter-fill {
      height: 100%;
      border-radius: 2px;
      transition: width .5s
    }

    .meter-val {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted2);
      width: 30px;
      text-align: right
    }

    .ae-box {
      padding: 12px;
      background: rgba(255, 69, 96, .06);
      border: 1px solid rgba(255, 69, 96, .2);
      border-radius: 6px
    }

    .ae-box.safe {
      background: rgba(0, 212, 180, .05);
      border-color: rgba(0, 212, 180, .15)
    }

    .ae-title {
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 4px
    }

    .ae-desc {
      font-size: 11px;
      color: var(--muted2);
      line-height: 1.5
    }

    /* PROJECTS PAGE */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px
    }

    .proj-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: border-color .15s
    }

    .proj-card:hover {
      border-color: var(--border2)
    }

    .proj-card.new-card {
      border-style: dashed;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      min-height: 160px
    }

    .proj-card.new-card:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    .proj-name {
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px
    }

    .proj-kw {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 12px
    }

    .proj-kw span {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 7px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted2)
    }

    .proj-stats {
      display: flex;
      gap: 16px
    }

    .proj-stat {
      text-align: center
    }

    .proj-stat .n {
      font-family: var(--sans);
      font-size: 18px;
      font-weight: 700
    }

    .proj-stat .l {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase
    }

    .proj-stat .n.alert {
      color: var(--red)
    }

    /* FORM */
    .form-group {
      margin-bottom: 14px
    }

    .form-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
      display: block
    }

    .form-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--body);
      outline: none;
      transition: border-color .15s
    }

    .form-input:focus {
      border-color: var(--accent)
    }

    .form-select {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--body);
      outline: none
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      cursor: pointer
    }

    .btn {
      padding: 9px 18px;
      border-radius: 6px;
      border: none;
      font-family: var(--mono);
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .3px
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      font-weight: 600
    }

    .btn-primary:hover {
      background: #00eecb
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted2);
      border: 1px solid var(--border)
    }

    .btn-ghost:hover {
      border-color: var(--border2);
      color: var(--text)
    }

    /* CHART */
    .recharts-text {
      fill: var(--muted) !important;
      font-size: 11px !important;
      font-family: 'DM Mono', monospace !important
    }

    .recharts-cartesian-grid-horizontal line,
    .recharts-cartesian-grid-vertical line {
      stroke: var(--border) !important
    }

    .recharts-tooltip-wrapper .recharts-default-tooltip {
      background: var(--bg4) !important;
      border: 1px solid var(--border2) !important;
      border-radius: 6px !important
    }

    /* FILTERS */
    .filter-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap
    }

    .filter-btn {
      font-family: var(--mono);
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted2);
      cursor: pointer;
      transition: all .15s
    }

    .filter-btn:hover,
    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0, 212, 180, .07)
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100
    }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 14px;
      width: 460px;
      max-width: 90vw;
      max-height: 80vh;
      overflow-y: auto
    }

    .modal-header {
      padding: 20px 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px
    }

    .modal-title {
      font-family: var(--sans);
      font-size: 16px;
      font-weight: 600
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1
    }

    .modal-body {
      padding: 0 20px 20px
    }

    /* AGENT CHAT */
    .chat-wrap {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 52px);
      padding: 20px 24px;
      gap: 14px
    }

    .chat-header-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0
    }

    .chat-avatar {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, #00d4b4, #0099ff);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .chat-agent-name {
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600
    }

    .chat-agent-desc {
      font-size: 11px;
      color: var(--muted2);
      font-family: var(--mono);
      margin-top: 2px
    }

    .chat-context-chips {
      display: flex;
      gap: 6px;
      margin-left: auto
    }

    .ctx-chip {
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      color: var(--muted2)
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-right: 4px
    }

    .chat-msg {
      display: flex;
      gap: 10px;
      align-items: flex-start
    }

    .chat-msg.user {
      flex-direction: row-reverse
    }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px
    }

    .msg-avatar.agent {
      background: linear-gradient(135deg, #00d4b4, #0099ff)
    }

    .msg-avatar.user {
      background: var(--bg4);
      border: 1px solid var(--border2);
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted2)
    }

    .msg-bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.6
    }

    .msg-bubble.agent {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
      color: var(--text)
    }

    .msg-bubble.user {
      background: rgba(0, 212, 180, .1);
      border: 1px solid rgba(0, 212, 180, .2);
      border-bottom-right-radius: 3px;
      color: var(--text)
    }

    .msg-bubble.agent strong {
      color: var(--accent);
      font-weight: 500
    }

    .msg-bubble.agent em {
      color: var(--amber);
      font-style: normal
    }

    .msg-time {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      margin-top: 4px;
      text-align: right
    }

    .msg-typing {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 12px 14px
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: typing-bounce .9s infinite
    }

    .typing-dot:nth-child(2) {
      animation-delay: .15s
    }

    .typing-dot:nth-child(3) {
      animation-delay: .3s
    }

    @keyframes typing-bounce {

      0%,
      60%,
      100% {
        transform: translateY(0)
      }

      30% {
        transform: translateY(-6px)
      }
    }

    .chat-suggestions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      flex-shrink: 0
    }

    .suggestion-btn {
      font-family: var(--mono);
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--bg3);
      color: var(--muted2);
      cursor: pointer;
      transition: all .15s;
      text-align: left
    }

    .suggestion-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0, 212, 180, .05)
    }

    .chat-input-row {
      display: flex;
      gap: 10px;
      flex-shrink: 0
    }

    .chat-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 11px 16px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--body);
      outline: none;
      transition: border-color .15s;
      resize: none
    }

    .chat-input:focus {
      border-color: var(--accent)
    }

    .chat-send {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 10px;
      padding: 11px 18px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      flex-shrink: 0
    }

    .chat-send:hover {
      background: #00eecb
    }

    .chat-send:disabled {
      background: var(--border2);
      color: var(--muted);
      cursor: not-allowed
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const API = 'http://localhost:8000';

    // ── Icons (SVG inline) ────────────────────────────────────────────────────────
    const Icon = ({ name, size = 14 }) => {
      const icons = {
        activity: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12" /></svg>,
        grid: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" /><rect x="14" y="14" width="7" height="7" /><rect x="3" y="14" width="7" height="7" /></svg>,
        signal: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1.5 8.5a13 13 0 0 1 21 0" /><path d="M5 12a10 10 0 0 1 14 0" /><path d="M8.5 15.5a6 6 0 0 1 7 0" /><circle cx="12" cy="19" r="1" /></svg>,
        alert: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" /><line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" /></svg>,
        shield: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg>,
        plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>,
        zap: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></svg>,
        search: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>,
      };
      return icons[name] || null;
    };

    // ── PulseLogo ─────────────────────────────────────────────────────────────────
    const PulseLogo = () => (
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="13" stroke="#00d4b4" strokeWidth="1" opacity="0.3" />
        <circle cx="14" cy="14" r="9" stroke="#00d4b4" strokeWidth="1" opacity="0.5" />
        <polyline points="4,14 8,14 10,9 13,19 15,11 17,16 19,14 24,14" stroke="#00d4b4" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round" />
      </svg>
    );

    // ── Highlight drug/symptom names in text ─────────────────────────────────────
    const highlightText = (text, entities = []) => {
      if (!entities.length) return text;
      let result = text;
      entities.forEach(e => {
        const regex = new RegExp(`(${e.name})`, 'gi');
        result = result.replace(regex, `<em>$1</em>`);
      });
      return result;
    };

    // ── Sidebar ───────────────────────────────────────────────────────────────────
    const Sidebar = ({ page, setPage, alertCount }) => {
      const navItems = [
        { id: 'dashboard', icon: 'grid', label: 'Dashboard' },
        { id: 'signals', icon: 'signal', label: 'Signal Feed', badge: alertCount },
        { id: 'projects', icon: 'zap', label: 'Projects' },
        { id: 'alerts', icon: 'alert', label: 'Adverse Events', badge: alertCount },
        { id: 'agent', icon: 'activity', label: 'Agent Chat' },
      ];
      return (
        <div className="sidebar">
          <div className="sidebar-logo">
            <div className="logo-mark">
              <div className="logo-pulse"><PulseLogo /></div>
              <div>
                <div className="logo-text">MedPulse</div>
                <div className="logo-sub">AI for Bharat</div>
              </div>
            </div>
          </div>
          <div className="sidebar-nav">
            <div className="nav-section">Monitor</div>
            {navItems.map(item => (
              <div key={item.id} className={`nav-item ${page === item.id ? 'active' : ''}`} onClick={() => setPage(item.id)}>
                <Icon name={item.icon} size={14} />
                {item.label}
                {item.badge > 0 && <span className="badge">{item.badge}</span>}
              </div>
            ))}
          </div>
          <div className="sidebar-bottom">
            <div className="api-status"><div className="dot" /><span>API Connected</span></div>
          </div>
        </div>
      );
    };

    // ── Dashboard Page ─────────────────────────────────────────────────────────────
    const Dashboard = ({ stats, trends }) => {

      const topDay = trends.length ? trends.reduce((a, b) => a.signals > b.signals ? a : b) : {};

      const statCards = [
        { label: 'Total Signals', value: stats.total_signals?.toLocaleString() || '—', cls: 'blue', sub: 'all time' },
        { label: 'Today', value: stats.signals_today || '—', cls: 'green', sub: 'new signals' },
        { label: 'Adverse Events', value: stats.adverse_events || '—', cls: 'amber', sub: 'detected' },
        { label: 'High Severity', value: stats.high_severity || '—', cls: 'red', sub: 'needs review', valCls: 'red' },
        { label: 'PII Redacted', value: stats.pii_redacted || '—', cls: 'purple', sub: 'protected' },
        { label: 'Sources Active', value: stats.sources_active || '—', cls: 'muted', sub: 'crawlers live' },
      ];

      const sourceData = [
        { name: 'Reddit', value: 52, color: '#ff4500' },
        { name: 'Twitter/X', value: 31, color: '#1da1f2' },
        { name: 'Quora', value: 17, color: '#a82400' },
      ];

      return (
        <div className="content">

          {/* 🚨 ALERT */}
          <div style={{
            background: 'rgba(255,69,96,0.1)',
            border: '1px solid rgba(255,69,96,0.3)',
            padding: '10px 14px',
            borderRadius: 8,
            color: '#ff4560',
            fontSize: 13,
            marginBottom: 16
          }}>
            🚨 Critical Alert: Possible anaphylaxis detected (Amoxicillin case)
          </div>

          {/* STATS */}
          <div className="stats-row">
            {statCards.map(s => (
              <div key={s.label} className={`stat-card ${s.cls}`}>
                <div className="stat-label">{s.label}</div>
                <div className={`stat-value ${s.valCls || ''}`}>{s.value}</div>
                <div className="stat-sub">{s.sub}</div>
                {s.label === "Adverse Events" && (
                  <div style={{ color: '#ff4560', fontSize: 10 }}>↑ +22% today</div>
                )}
              </div>
            ))}
          </div>

          {/* AI INSIGHTS */}
          <div className="card">
            <div className="card-header">
              <span className="card-title">AI Insights</span>
            </div>
            <div className="card-body" style={{ fontSize: 13, lineHeight: 1.6 }}>
              ⚠️ Peak signals observed on <b>{topDay.date || '-'}</b>.<br />
              High severity cases: <b>{stats.high_severity}</b>.<br />
              Most discussed drugs: <b>Metformin</b>, <b>Ozempic</b>.<br />
              Negative sentiment dominates across Twitter/X signals.
            </div>
          </div>

          {/* 🔥 NEW CLEAN LAYOUT */}
          <div style={{ display: 'flex', gap: 16, marginTop: 16 }}>

            {/* LEFT SIDE */}
            <div style={{ flex: 2, display: 'flex', flexDirection: 'column', gap: 16 }}>

              {/* SIGNAL VOLUME */}
              <div className="card">
                <div className="card-header">
                  <span className="card-title">Signal Volume — 7 Days</span>
                  <span className="card-action">Export</span>
                </div>
                <div className="card-body">

                  <div style={{ display: 'flex', gap: 20 }}>

                    <div style={{ height: 200, display: 'flex', alignItems: 'flex-end', gap: 10 }}>
                      {trends.map((t, i) => (
                        <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                          <div style={{
                            width: 18,
                            height: t.signals / 2,
                            background: '#00d4b4',
                            borderRadius: 4,
                            position: 'relative'
                          }}>
                            <span style={{
                              position: 'absolute',
                              top: -14,
                              fontSize: 9,
                              color: '#aaa'
                            }}>
                              {t.signals}
                            </span>
                          </div>
                          <div style={{ fontSize: 10, color: '#666', marginTop: 4 }}>{t.date}</div>
                        </div>
                      ))}
                    </div>

                    <div className="card" style={{ minWidth: 180 }}>
                      <div className="card-header">
                        <span className="card-title">Top Drugs</span>
                      </div>
                      <div className="card-body" style={{ fontSize: 12 }}>
                        💊 Metformin — 32 <br />
                        💊 Ozempic — 28 <br />
                        💊 Lisinopril — 19
                      </div>
                    </div>

                  </div>
                </div>
              </div>

              {/* SENTIMENT TREND (FIXED) */}
              <div className="card">
                <div className="card-header">
                  <span className="card-title">Sentiment Trend</span>
                  <span className="card-action">7-day view</span>
                </div>
                <div className="card-body">

                  <div style={{ display: 'flex', gap: 18, alignItems: 'flex-end', height: 160 }}>
                    {trends.map((t, i) => (
                      <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>

                        <div style={{ display: 'flex', gap: 4, alignItems: 'flex-end' }}>
                          <div style={{ width: 10, height: t.positive, background: '#00d4b4', borderRadius: 3 }} />
                          <div style={{ width: 10, height: t.negative, background: '#ff4560', borderRadius: 3 }} />
                        </div>

                        <div style={{ fontSize: 9, color: '#777', marginTop: 6 }}>
                          {t.date.slice(4)}
                        </div>

                      </div>
                    ))}
                  </div>

                  <div style={{ display: 'flex', gap: 20, marginTop: 10, fontSize: 11, color: '#aaa' }}>
                    <span style={{ color: '#00d4b4' }}>■ Positive</span>
                    <span style={{ color: '#ff4560' }}>■ Negative</span>
                  </div>

                </div>
              </div>

            </div>

            {/* RIGHT SIDE */}
            <div style={{ flex: 1 }}>

              <div className="card" style={{ height: '100%' }}>
                <div className="card-header">
                  <span className="card-title">Source Distribution</span>
                </div>
                <div className="card-body">

                  <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                    {sourceData.map((s, i) => (
                      <div key={i}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11 }}>
                          <span>{s.name}</span>
                          <span>{s.value}%</span>
                        </div>
                        <div style={{
                          height: 6,
                          background: '#111',
                          borderRadius: 4,
                          marginTop: 4
                        }}>
                          <div style={{
                            width: `${s.value}%`,
                            height: '100%',
                            background: s.color,
                            borderRadius: 4
                          }} />
                        </div>
                      </div>
                    ))}
                  </div>

                </div>
              </div>

            </div>

          </div>

        </div>
      );
    };
    // ── Signal Feed Page ──────────────────────────────────────────────────────────
    const SignalFeed = ({ signals }) => {
      const [selected, setSelected] = useState(null);
      const [analysis, setAnalysis] = useState(null);
      const [loading, setLoading] = useState(false);
      const [sourceFilter, setSourceFilter] = useState('All');
      const sources = ['All', 'Reddit', 'Twitter/X', 'Quora'];

      const filtered = sourceFilter === 'All' ? signals : signals.filter(s => s.source === sourceFilter);

      const analyze = async (sig) => {
        setSelected(sig);
        setAnalysis(null);
        setLoading(true);
        try {
          const res = await fetch(`${API}/signals/analyze`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ post_id: sig.id, text: sig.text })
          });
          const data = await res.json();
          setAnalysis(data);
        } catch (e) {
          setAnalysis({ error: 'Analysis failed. Is the backend running?' });
        }
        setLoading(false);
      };

      const formatTime = (ts) => {
        const d = new Date(ts);
        const diff = Math.floor((Date.now() - d.getTime()) / 60000);
        if (diff < 60) return `${diff}m ago`;
        return `${Math.floor(diff / 60)}h ago`;
      };

      const getSeverityClass = (sev) => ({ Critical: 'critical', High: 'high', Medium: 'medium', Low: 'low' })[sev] || '';

      return (
        <div className="content">
          <div className="card">
            <div className="card-header">
              <span className="card-title">Live Signal Feed</span>
              <div className="filter-bar">
                {sources.map(s => (
                  <button key={s} className={`filter-btn ${sourceFilter === s ? 'active' : ''}`} onClick={() => setSourceFilter(s)}>{s}</button>
                ))}
              </div>
            </div>
            <div className="card-body" style={{ display: 'grid', gridTemplateColumns: '1fr 320px', gap: 16, minHeight: 500 }}>
              <div style={{ overflow: 'auto', maxHeight: '70vh' }}>
                <div className="signal-list">
                  {filtered.map(sig => (
                    <div key={sig.id} className={`signal-item ${selected?.id === sig.id ? 'selected' : ''}`} onClick={() => analyze(sig)}>
                      <div className="sig-meta">
                        <span className="sig-source">{sig.source}</span>
                        {sig.subreddit !== '—' && <span className="sig-source">{sig.subreddit}</span>}
                        <span className="sig-time">{formatTime(sig.ts)}</span>
                      </div>
                      <div className="sig-text" dangerouslySetInnerHTML={{ __html: sig.text.length > 120 ? sig.text.slice(0, 120) + '…' : sig.text }} />
                      <div style={{ marginTop: 6, fontSize: 10, color: 'var(--muted)', fontFamily: 'var(--mono)' }}>
                        ↑ {sig.upvotes} · {sig.author}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              <div className="analysis-panel">
                <div className="card-header"><span className="card-title">Claude NLP Analysis</span></div>
                {!selected && (
                  <div className="analysis-empty">
                    <div className="icon">⚕</div>
                    <p>Select a signal to run AI-powered pharmacovigilance analysis</p>
                  </div>
                )}
                {selected && loading && (
                  <div className="analysis-loading">
                    <div className="spinner" />
                    <div className="loading-text">Analyzing with AI…</div>
                  </div>
                )}
                {selected && !loading && analysis && !analysis.error && (
                  <div className="analysis-result">
                    <div className="ar-section">
                      <div className="ar-label">Clinical Summary</div>
                      <div className="ar-summary">{analysis.summary}</div>
                    </div>
                    <div className="ar-section">
                      <div className="ar-label">Adverse Event</div>
                      <div className={`ae-box ${analysis.adverse_event_detected ? '' : 'safe'}`}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
                          <div className="ae-title">{analysis.adverse_event_detected ? '⚠ Detected' : '✓ None Detected'}</div>
                          {analysis.adverse_event_severity !== 'None' && (
                            <span className={`severity-badge ${analysis.adverse_event_severity}`}>{analysis.adverse_event_severity}</span>
                          )}
                        </div>
                        {analysis.adverse_event_description && <div className="ae-desc">{analysis.adverse_event_description}</div>}
                      </div>
                    </div>
                    <div className="ar-section">
                      <div className="ar-label">Entities Detected</div>
                      <div className="entity-list">
                        {(analysis.entities || []).map((e, i) => (
                          <div key={i} className="entity-row">
                            <span className="entity-name">{e.name}</span>
                            <span className="entity-type">{e.type}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                    <div className="ar-section">
                      <div className="ar-label">Sentiment</div>
                      <div className="meter-wrap">
                        <span className="meter-label">{analysis.sentiment}</span>
                        <div className="meter">
                          <div className="meter-fill" style={{
                            width: `${Math.abs(analysis.sentiment_score || 0) * 100}%`,
                            background: analysis.sentiment_score > 0 ? 'var(--accent)' : 'var(--red)'
                          }} />
                        </div>
                        <span className="meter-val">{((analysis.sentiment_score || 0).toFixed(2))}</span>
                      </div>
                    </div>
                    <div className="ar-section">
                      <div className="ar-label">Confidence</div>
                      <div className="meter-wrap">
                        <span className="meter-label">Score</span>
                        <div className="meter"><div className="meter-fill" style={{ width: `${(analysis.confidence || 0) * 100}%`, background: 'var(--purple)' }} /></div>
                        <span className="meter-val">{((analysis.confidence || 0) * 100).toFixed(0)}%</span>
                      </div>
                    </div>
                    {analysis.pii_detected && (
                      <div className="ar-section">
                        <div className="ar-label">PII / PHI</div>
                        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                          {(analysis.pii_types || []).map((p, i) => <span key={i} className="tag pii">{p}</span>)}
                        </div>
                      </div>
                    )}
                  </div>
                )}
                {selected && !loading && analysis?.error && (
                  <div className="analysis-empty">
                    <p style={{ color: 'var(--red)' }}>{analysis.error}</p>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ── Projects Page ─────────────────────────────────────────────────────────────
    const Projects = ({ projects, setProjects }) => {
      const [showModal, setShowModal] = useState(false);
      const [form, setForm] = useState({ name: '', keywords: '', sources: [], frequency: 'daily' });

      const createProject = async () => {
        try {
          const res = await fetch(`${API}/projects`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...form, keywords: form.keywords.split(',').map(k => k.trim()) })
          });
          const p = await res.json();
          setProjects(prev => [...prev, p]);
          setShowModal(false);
        } catch (e) {
          alert('Backend not running. Add project in demo mode.');
          setShowModal(false);
        }
      };

      const toggleSource = (src) => {
        setForm(f => ({ ...f, sources: f.sources.includes(src) ? f.sources.filter(s => s !== src) : [...f.sources, src] }));
      };

      return (
        <div className="content">
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
            <div style={{ fontFamily: 'var(--sans)', fontSize: 18, fontWeight: 600 }}>Monitoring Projects</div>
            <button className="btn btn-primary" onClick={() => setShowModal(true)}>
              <Icon name="plus" size={12} /> New Project
            </button>
          </div>
          <div className="projects-grid">
            {projects.map(p => (
              <div key={p.id} className="proj-card">
                <div className="proj-name">{p.name}</div>
                <div className="proj-kw">{p.keywords.map(k => <span key={k}>{k}</span>)}</div>
                <div style={{ fontSize: 10, color: 'var(--muted)', fontFamily: 'var(--mono)', marginBottom: 12 }}>
                  {p.sources.join(' · ')} · {p.frequency}
                </div>
                <div className="proj-stats">
                  <div className="proj-stat"><div className="n">{p.signal_count}</div><div className="l">Signals</div></div>
                  <div className="proj-stat"><div className={`n ${p.alert_count > 5 ? 'alert' : ''}`}>{p.alert_count}</div><div className="l">Alerts</div></div>
                  <div className="proj-stat"><div className="n" style={{ fontSize: 11, color: 'var(--accent)' }}>{p.created}</div><div className="l">Created</div></div>
                </div>
              </div>
            ))}
            <div className="proj-card new-card" onClick={() => setShowModal(true)}>
              <Icon name="plus" size={20} /><span style={{ fontFamily: 'var(--mono)', fontSize: 11 }}>New Project</span>
            </div>
          </div>

          {showModal && (
            <div className="modal-overlay" onClick={(e) => e.target === e.currentTarget && setShowModal(false)}>
              <div className="modal">
                <div className="modal-header">
                  <span className="modal-title">Create Monitoring Project</span>
                  <button className="modal-close" onClick={() => setShowModal(false)}>×</button>
                </div>
                <div className="modal-body">
                  <div className="form-group">
                    <label className="form-label">Project Name</label>
                    <input className="form-input" placeholder="e.g. Metformin Adverse Events" value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} />
                  </div>
                  <div className="form-group">
                    <label className="form-label">Keywords (comma separated)</label>
                    <input className="form-input" placeholder="metformin, glucophage, diabetes medication" value={form.keywords} onChange={e => setForm(f => ({ ...f, keywords: e.target.value }))} />
                  </div>
                  <div className="form-group">
                    <label className="form-label">Data Sources</label>
                    <div className="checkbox-group">
                      {['Reddit', 'Twitter/X', 'Quora'].map(src => (
                        <label key={src} className="checkbox-item" style={{ color: form.sources.includes(src) ? 'var(--accent)' : 'var(--muted2)' }}>
                          <input type="checkbox" checked={form.sources.includes(src)} onChange={() => toggleSource(src)} style={{ accentColor: 'var(--accent)' }} />
                          {src}
                        </label>
                      ))}
                    </div>
                  </div>
                  <div className="form-group">
                    <label className="form-label">Crawl Frequency</label>
                    <select className="form-select" value={form.frequency} onChange={e => setForm(f => ({ ...f, frequency: e.target.value }))}>
                      <option value="realtime">Real-time</option>
                      <option value="hourly">Hourly</option>
                      <option value="daily">Daily</option>
                      <option value="weekly">Weekly</option>
                    </select>
                  </div>
                  <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 8 }}>
                    <button className="btn btn-ghost" onClick={() => setShowModal(false)}>Cancel</button>
                    <button className="btn btn-primary" onClick={createProject}>Create Project</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ── Adverse Events Page ───────────────────────────────────────────────────────
    const AdverseEvents = ({ signals }) => {
      const mock = [
        { id: 1, drug: 'Ozempic (Semaglutide)', symptom: 'Abdominal pain + constipation', severity: 'High', source: 'Twitter/X', time: '1h ago', status: 'Reviewing' },
        { id: 2, drug: 'Amoxicillin', symptom: 'Rash + breathing difficulty (possible anaphylaxis)', severity: 'Critical', source: 'Quora', time: '20m ago', status: 'Urgent' },
        { id: 3, drug: 'Warfarin', symptom: 'Unusual bruising', severity: 'High', source: 'Twitter/X', time: '45m ago', status: 'Reviewing' },
        { id: 4, drug: 'Atorvastatin', symptom: 'Muscle weakness + pain (possible myopathy)', severity: 'Medium', source: 'Quora', time: '3h ago', status: 'Logged' },
        { id: 5, drug: 'Metformin', symptom: 'Persistent nausea + vomiting', severity: 'Medium', source: 'Reddit', time: '2h ago', status: 'Logged' },
        { id: 6, drug: 'Lisinopril', symptom: 'Persistent dry cough (known ACE inhibitor SE)', severity: 'Low', source: 'Reddit', time: '5h ago', status: 'Logged' },
        { id: 7, drug: 'Ritalin (Methylphenidate)', symptom: 'Significant weight loss in child', severity: 'Medium', source: 'Reddit', time: '6h ago', status: 'Reviewing' },
      ];
      return (
        <div className="content">
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4 }}>
            <div style={{ fontFamily: 'var(--sans)', fontSize: 18, fontWeight: 600 }}>Adverse Event Alerts</div>
            <span className="topbar-chip live">LIVE</span>
          </div>
          <div className="card">
            <div className="card-body" style={{ padding: 0 }}>
              <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                <thead>
                  <tr style={{ borderBottom: '1px solid var(--border)' }}>
                    {['Drug/Agent', 'Reported Symptom', 'Severity', 'Source', 'Time', 'Status'].map(h => (
                      <th key={h} style={{ padding: '10px 16px', textAlign: 'left', fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.5px' }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {mock.map(row => (
                    <tr key={row.id} style={{ borderBottom: '1px solid var(--border)', transition: 'background .1s', cursor: 'pointer' }}
                      onMouseEnter={e => e.currentTarget.style.background = 'var(--bg3)'}
                      onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                      <td style={{ padding: '12px 16px', fontWeight: 500, fontSize: 13 }}>{row.drug}</td>
                      <td style={{ padding: '12px 16px', fontSize: 12, color: 'var(--muted2)', maxWidth: 280 }}>{row.symptom}</td>
                      <td style={{ padding: '12px 16px' }}><span className={`severity-badge ${row.severity}`}>{row.severity}</span></td>
                      <td style={{ padding: '12px 16px', fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--muted2)' }}>{row.source}</td>
                      <td style={{ padding: '12px 16px', fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--muted)' }}>{row.time}</td>
                      <td style={{ padding: '12px 16px' }}>
                        <span style={{
                          fontFamily: 'var(--mono)', fontSize: 10, padding: '3px 8px', borderRadius: 4,
                          background: row.status === 'Urgent' ? 'rgba(255,69,96,.15)' : row.status === 'Reviewing' ? 'rgba(255,180,32,.1)' : 'rgba(90,112,144,.1)',
                          color: row.status === 'Urgent' ? 'var(--red)' : row.status === 'Reviewing' ? 'var(--amber)' : 'var(--muted2)'
                        }}>{row.status}</span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    };

    // ── Agent Chat Page ───────────────────────────────────────────────────────────
    const SUGGESTIONS = [
      "Which drug has the most adverse event reports today?",
      "Summarize all critical severity signals",
      "Are there any potential anaphylaxis cases in the feed?",
      "What patterns do you see across the Ozempic signals?",
      "Which signals need urgent medical review?",
      "Compare sentiment across Reddit vs Twitter/X",
    ];

    const formatAgentText = (text) => {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`(.*?)`/g, '<code style="font-family:var(--mono);font-size:11px;background:var(--bg);padding:1px 5px;border-radius:3px;color:var(--accent)">$1</code>')
        .replace(/\n/g, '<br/>');
    };

    const AgentChat = ({ signals, stats }) => {
      const [messages, setMessages] = useState([
        {
          role: 'agent',
          text: "Hi! I'm **MedPulse Agent**, your pharmacovigilance AI assistant.\n\nI have full context of all current signals, adverse events, and trends in this session. Ask me anything about the data — I can identify patterns, flag risks, summarize findings, or help you decide what needs urgent review.\n\nWhat would you like to know?",
          time: 'now'
        }
      ]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const bottomRef = React.useRef(null);

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, loading]);

      const buildSystemPrompt = () => {
        const sigSummary = signals.map(s =>
          `- [${s.source}] "${s.text.slice(0, 120)}" (upvotes: ${s.upvotes})`
        ).join('\n');

        return `You are MedPulse Agent, an expert AI pharmacovigilance analyst embedded in the MedPulse platform. You help researchers and safety teams understand drug-related signals from social media.

CURRENT SIGNAL DATA (${signals.length} signals loaded):
${sigSummary}

PLATFORM STATS:
- Total signals: ${stats.total_signals || 1247}
- Adverse events detected: ${stats.adverse_events || 89}
- High severity cases: ${stats.high_severity || 14}
- PII redacted: ${stats.pii_redacted || 203}
- Active sources: Reddit, Twitter/X, Quora

KNOWN ADVERSE EVENTS IN CURRENT FEED:
- Ozempic: abdominal pain, constipation (High severity)
- Amoxicillin: rash + breathing difficulty - possible anaphylaxis (Critical)
- Warfarin: unusual bruising (High severity)
- Atorvastatin: muscle weakness - possible myopathy (Medium)
- Metformin: nausea, vomiting (Medium)
- Lisinopril: dry cough - known ACE inhibitor side effect (Low)
- Ritalin: weight loss in child (Medium)

Your role:
- Answer questions about the signal data clearly and concisely
- Flag urgent patterns proactively
- Use pharmacovigilance terminology correctly
- Be direct — this is a clinical safety context
- Format answers with **bold** for drug names and *italics* for symptoms
- Keep responses focused and actionable, under 200 words unless asked for detail`;
      };

      const send = async (text) => {
        const q = text || input.trim();
        if (!q || loading) return;
        setInput('');

        const userMsg = { role: 'user', text: q, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
        setMessages(prev => [...prev, userMsg]);
        setLoading(true);

        const history = messages
          .filter(m => m.role !== 'system')
          .map(m => ({ role: m.role === 'agent' ? 'assistant' : 'user', content: m.text }));

        try {
          const res = await fetch(`${API}/agent/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              system: buildSystemPrompt(),
              messages: [...history, { role: 'user', content: q }]
            })
          });
          const data = await res.json();
          console.log("CHAT API RESPONSE:", data);
          const reply = data.response || 'No response from AI';
          setMessages(prev => [...prev, {
            role: 'agent',
            text: reply,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          }]);
        } catch (e) {
          setMessages(prev => [...prev, {
            role: 'agent',
            text: 'Connection error. Please ensure the MedPulse backend is running on port 8000.',
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          }]);
        }
        setLoading(false);
      };

      const handleKey = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
      };

      return (
        <div className="chat-wrap">
          {/* Header */}
          <div className="chat-header-card">
            <div className="chat-avatar">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2">
                <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z" />
              </svg>
            </div>
            <div>
              <div className="chat-agent-name">MedPulse Agent</div>
              <div className="chat-agent-desc">Pharmacovigilance AI · Powered by Claude</div>
            </div>
            <div className="chat-context-chips">
              <span className="ctx-chip">{signals.length} signals loaded</span>
              <span className="ctx-chip" style={{ borderColor: 'rgba(255,69,96,.3)', color: 'var(--red)' }}>
                {stats.high_severity || 14} high severity
              </span>
            </div>
          </div>

          {/* Messages */}
          <div className="chat-messages">
            {messages.map((msg, i) => (
              <div key={i} className={`chat-msg ${msg.role === 'user' ? 'user' : ''}`}>
                <div className={`msg-avatar ${msg.role === 'agent' ? 'agent' : 'user'}`}>
                  {msg.role === 'agent'
                    ? <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z" /></svg>
                    : 'YOU'
                  }
                </div>
                <div>
                  <div
                    className={`msg-bubble ${msg.role === 'agent' ? 'agent' : 'user'}`}
                    dangerouslySetInnerHTML={{ __html: formatAgentText(msg.text) }}
                  />
                  {msg.time && <div className="msg-time">{msg.time}</div>}
                </div>
              </div>
            ))}
            {loading && (
              <div className="chat-msg">
                <div className="msg-avatar agent">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z" /></svg>
                </div>
                <div className="msg-bubble agent">
                  <div className="msg-typing">
                    <div className="typing-dot" /><div className="typing-dot" /><div className="typing-dot" />
                  </div>
                </div>
              </div>
            )}
            <div ref={bottomRef} />
          </div>

          {/* Suggestions */}
          {messages.length <= 2 && (
            <div className="chat-suggestions">
              {SUGGESTIONS.map((s, i) => (
                <button key={i} className="suggestion-btn" onClick={() => send(s)}>{s}</button>
              ))}
            </div>
          )}

          {/* Input */}
          <div className="chat-input-row">
            <textarea
              className="chat-input"
              rows={2}
              placeholder="Ask about signals, patterns, adverse events, or drug safety trends…"
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={handleKey}
            />
            <button className="chat-send" onClick={() => send()} disabled={loading || !input.trim()}>
              {loading ? '…' : 'Send →'}
            </button>
          </div>
        </div>
      );
    };

    // ── App Shell ─────────────────────────────────────────────────────────────────
    const App = () => {
      const [page, setPage] = useState('dashboard');
      const [stats, setStats] = useState({});
      const [trends, setTrends] = useState([]);
      const [signals, setSignals] = useState([]);
      const [projects, setProjects] = useState([]);

      useEffect(() => {
        const load = async () => {
          try {
            const [s, t, sig, p] = await Promise.all([
              fetch(`${API}/stats`).then(r => r.json()),
              fetch(`${API}/trends`).then(r => r.json()),
              fetch(`${API}/signals`).then(r => r.json()),
              fetch(`${API}/projects`).then(r => r.json()),
            ]);
            setStats(s); setTrends(t); setSignals(sig); setProjects(p);
          } catch (e) {
            console.warn('Backend not connected, using mock preview.');
            setStats({ total_signals: 1247, adverse_events: 89, high_severity: 14, sources_active: 3, signals_today: 47, pii_redacted: 203 });
            setTrends(Array.from({ length: 7 }, (_, i) => ({ date: `Day ${i + 1}`, signals: 150 + i * 20, adverse: 10 + i * 2, positive: 50 + i * 5, negative: 70 + i * 3 })));
            setSignals([
              { id: "1", source: "Reddit", subreddit: "r/diabetes", text: "Been on Metformin for 3 months now. Getting really bad nausea every morning, sometimes vomiting.", author: "u/[redacted]", upvotes: 47, ts: new Date(Date.now() - 7200000).toISOString() },
              { id: "2", source: "Twitter/X", subreddit: "—", text: "Day 14 on Ozempic. Lost 4kg but dealing with severe constipation and abdominal pain. Anyone else?", author: "@[redacted]", upvotes: 112, ts: new Date(Date.now() - 3600000).toISOString() },
              { id: "3", source: "Quora", subreddit: "—", text: "Started amoxicillin for a tooth infection. Developed a rash after 2 days. Now having trouble breathing slightly.", author: "Anonymous", upvotes: 9, ts: new Date(Date.now() - 1200000).toISOString() },
            ]);
            setProjects([
              { id: "p1", name: "Ozempic / Semaglutide Watch", keywords: ["ozempic", "semaglutide"], sources: ["Reddit", "Twitter/X"], frequency: "realtime", signal_count: 234, alert_count: 12, created: "2026-04-01" },
              { id: "p2", name: "Statin Safety Monitor", keywords: ["atorvastatin", "statin"], sources: ["Reddit", "Quora"], frequency: "daily", signal_count: 89, alert_count: 4, created: "2026-03-15" },
            ]);
          }
        };
        load();
      }, []);

      const pageTitles = { dashboard: 'Overview', signals: 'Signal Feed', projects: 'Projects', alerts: 'Adverse Events', agent: 'Agent Chat' };
      const alertCount = stats.high_severity || 0;

      return (
        <div className="app">
          <Sidebar page={page} setPage={setPage} alertCount={alertCount} />
          <div className="main">
            <div className="topbar">
              <span className="topbar-title">{pageTitles[page]}</span>
              <span className="topbar-chip">Theme 6 — Real-Time Social Listening</span>
              <span className="topbar-chip live">● LIVE</span>
            </div>
            {page === 'dashboard' && <Dashboard stats={stats} trends={trends} />}
            {page === 'signals' && <SignalFeed signals={signals} />}
            {page === 'projects' && <Projects projects={projects} setProjects={setProjects} />}
            {page === 'alerts' && <AdverseEvents signals={signals} />}
            {page === 'agent' && <AgentChat signals={signals} stats={stats} />}
          </div>
        </div>
      );
    };

    // The stable ReactDOM rendering call for React 17
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>

</html>
